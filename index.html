function buildPrompt(prof, nicho, contentType, pillar, topic) {
  return `Eres el mejor estratega de contenido viral del mundo para Latinoamérica.
Tu misión: crear guiones que generen atención inmediata, retención, comentarios, shares y ventas.

PERFIL DEL CREADOR:
Profesión: ${prof.nombre}
Nicho elegido: ${nicho.label} — ${nicho.desc}
Categoría: ${prof.categoria}

ESTILO — RYAN SERHANT:
- Autoridad aspiracional desde la experiencia real
- Storytelling en primera persona con momentos concretos
- Frases cortas. Golpe a golpe. Sin relleno.
- Contraste entre el antes (ignorancia/problema) y el después (conocimiento/solución)
- Nunca suena a vendedor. Suena a quien ya sabe y te muestra lo que nadie te dijo.

EJE CENTRAL: "No es talento. Es sistema." — siempre debe sentirse.

FORMATO — devuelve EXACTAMENTE este JSON sin texto extra ni backticks markdown:
{"hook":"...","guion":"...","vision_visual":"...","carrusel":["slide1","slide2","slide3","slide4","slide5","slide6"],"caption":"..."}

REGLAS:
- Guion: máximo 40 segundos en voz alta. Hook → Body → Remate → CTA
- CTA siempre termina con: comenta SISTEMA
- Caption: emocional, storytelling corto, CTA + hashtags relevantes a la profesión
- Español latinoamericano, sin vos/che, directo y aspiracional
- El contenido debe hacer pensar: "Esto nunca lo había visto así"

TEMA A DESARROLLAR: ${topic}
TIPO DE CONTENIDO: ${contentType}
PILAR: ${pillar}`;
}

function ResultCard({ num, title, content, accent }) {
  const [open, setOpen] = React.useState(num === "01");
  const [copied, setCopied] = React.useState(false);
  const copy = (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(content).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <div style={S.resultCard}>
      <div style={S.cardTop(open)} onClick={() => setOpen(!open)}>
        <div style={S.cardLeft}>
          <span style={S.cardNum(accent)}>{num}</span>
          <span style={S.cardTitle}>{title}</span>
        </div>
        <div style={S.cardActions}>
          <button style={S.cpyBtn(copied)} onClick={copy}>{copied ? "✓ Copiado" : "Copiar"}</button>
          <span style={S.chevron(open)}>▼</span>
        </div>
      </div>
      {open && (
        <div style={S.cardBody}>
          <p style={S.cardText}>{content}</p>
        </div>
      )}
    </div>
  );
}

  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [result, setResult] = React.useState(null);
  const [resultMeta, setResultMeta] = React.useState(null);
  const [historial, setHistorial] = React.useState([]);
  const [copiedAll, setCopiedAll] = React.useState(false);

  const apiValid = apiKey.startsWith("sk-ant-") && apiKey.length > 20;
  const prof = PROFESIONES.find(p => p.id === profId);
  const nicho = prof && nichoIdx !== null ? prof.nichos[nichoIdx] : null;

  const selectProf = (id) => {
    setProfId(id);
    setNichoIdx(null);
    setTopic("");
    setResult(null);
    setError(null);
  };

  const selectNicho = (idx) => {
    setNichoIdx(idx);
    const n = prof.nichos[idx];
    setTopic(n.desc);
  };

  const generate = async () => {
    if (!apiValid) { setError("Ingresa una API Key válida de Anthropic (sk-ant-...)"); return; }
    if (!prof) { setError("Selecciona una profesión primero"); return; }
    if (!nicho) { setError("Selecciona un nicho de contenido"); return; }
    if (!topic.trim()) { setError("Escribe el tema a desarrollar"); return; }

    setLoading(true); setError(null); setResult(null);

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          system: buildPrompt(prof, nicho, contentType, pillar, topic),
          messages: [{ role: "user", content: `Genera el guión viral para: ${prof.nombre} — ${nicho.label}. Tema: ${topic}` }],
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || "Error en la API");
      const raw = data.content[0].text.trim()
        .replace(/^```json\s*/i, "").replace(/^```\s*/i, "").replace(/```\s*$/i, "").trim();
      const parsed = JSON.parse(raw);
      setResult(parsed);
      const meta = { profId, nichoLabel: nicho.label, topic, contentType, pillar, accent: prof.accent };
      setResultMeta(meta);

      const entry = {
        id: Date.now(),
        profId, nichoLabel: nicho.label, topic, contentType, pillar,
        accent: prof.accent, profNombre: prof.nombre,
        data: parsed,
        time: new Date().toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" }),
        date: new Date().toLocaleDateString("es", { day: "2-digit", month: "short" }),
      };
      setHistorial(prev => [entry, ...prev].slice(0, 20));
    } catch (err) {
      setError(err.message || "Error inesperado. Intenta de nuevo.");
    } finally {
      setLoading(false);
    }
  };

  const loadHist = (entry) => {
    setProfId(entry.profId);
    const p = PROFESIONES.find(x => x.id === entry.profId);
    if (p) {
      const idx = p.nichos.findIndex(n => n.label === entry.nichoLabel);
      setNichoIdx(idx >= 0 ? idx : null);
    }
    setTopic(entry.topic);
    setContentType(entry.contentType);
    setPillar(entry.pillar);
    setResult(entry.data);
    setResultMeta({ profId: entry.profId, nichoLabel: entry.nichoLabel, accent: entry.accent });
  };

  const copyAll = () => {
    if (!result) return;
    const sections = [
      ["HOOK VIRAL", result.hook],
      ["GUIÓN DEL REEL", result.guion],
      ["VISIÓN VISUAL", result.vision_visual],
      ["VERSIÓN CARRUSEL", Array.isArray(result.carrusel) ? result.carrusel.map((s, i) => `SLIDE ${i + 1}:\n${s}`).join("\n\n") : result.carrusel],
      ["CAPTION + CTA", result.caption],
    ];
    navigator.clipboard.writeText(sections.map(([k, v]) => `=== ${k} ===\n${v}`).join("\n\n")).then(() => {
      setCopiedAll(true); setTimeout(() => setCopiedAll(false), 2000);
    });
  };

  const accent = prof?.accent || "#C9A84C";

  return (
    <div style={S.page}>
      <style>{`
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        * { box-sizing: border-box; }
        button:hover { opacity: 0.85; }
        select option { background: #fff; }
      `}</style>

      <div style={S.nav}>
        <span style={S.navBrand}>Generador de Guiones</span>
        <span style={S.navTag}>By @pablojagui · El Arquitecto de Sistemas</span>
      </div>

      <div style={S.hero}>
        <p style={S.heroEyebrow}>Contenido viral para profesionales</p>
        <h1 style={S.heroTitle}>Tu profesión.<br />Tu sistema de contenido.</h1>
        <p style={S.heroSub}>Selecciona tu profesión, elige tu nicho y genera guiones listos para grabar. El sistema hace el trabajo.</p>
      </div>

      <div style={S.wrap}>

        <span style={S.sectionTitle}>Acceso · API Key de Anthropic</span>
        <div style={S.apiRow}>
          <span style={S.apiLabel}>API Key</span>
          <input
            type="password"
            style={S.apiInput}
            placeholder="sk-ant-..."
            value={apiKey}
            onChange={e => setApiKey(e.target.value)}
          />
          <span style={apiValid ? S.apiOk : S.apiNo}>
            {apiValid ? "✓ Lista" : apiKey.length > 0 ? "Formato incorrecto" : "Sin clave"}
          </span>
        </div>

        <span style={S.sectionTitle}>01 — Selecciona tu profesión</span>
        <div style={S.profGrid}>
          {PROFESIONES.map(p => (
            <div
              key={p.id}
              style={S.profCard(profId === p.id, p.accent)}
              onClick={() => selectProf(p.id)}
            >
              <span style={S.profEmoji}>{p.emoji}</span>
              <div style={S.profName(profId === p.id)}>{p.nombre}</div>
              <div style={S.profCat(profId === p.id)}>{p.categoria}</div>
            </div>
          ))}
        </div>

        {prof && (
          <>
            <span style={S.sectionTitle}>02 — Elige tu nicho de contenido</span>
            <div style={S.nichoGrid}>
              {prof.nichos.map((n, i) => (
                <div
                  key={i}
                  style={S.nichoCard(nichoIdx === i, prof.accent)}
                  onClick={() => selectNicho(i)}
                >
                  <div style={S.nichoLabel(nichoIdx === i)}>{n.label}</div>
                  <div style={S.nichoDesc(nichoIdx === i)}>{n.desc}</div>
                </div>
              ))}
            </div>
          </>
        )}

        {nicho && (
          <>
            <span style={S.sectionTitle}>03 — Configura tu guión</span>
            <div style={S.formPanel}>
              <div style={S.formGrid2}>
                <div>
                  <label style={S.label}>Tipo de contenido</label>
                  <select style={S.select} value={contentType} onChange={e => setContentType(e.target.value)}>
                    <option value="reel">Reel / TikTok</option>
                    <option value="carrusel">Carrusel Instagram</option>
                    <option value="ambos">Reel + Carrusel</option>
                  </select>
                </div>
                <div>
                  <label style={S.label}>Pilar de contenido</label>
                  <select style={S.select} value={pillar} onChange={e => setPillar(e.target.value)}>
                    <option value="atraccion">Atracción (viral)</option>
                    <option value="nutricion">Nutrición (autoridad)</option>
                    <option value="conversion">Conversión (ventas)</option>
                  </select>
                </div>
              </div>
              <label style={S.label}>Tema específico a desarrollar</label>
              <input
                type="text"
                style={S.topicInput}
                placeholder="Describe el ángulo exacto que quieres abordar..."
                value={topic}
                onChange={e => setTopic(e.target.value)}
              />
              <button style={S.genBtn(loading)} onClick={generate} disabled={loading}>
                {loading ? "Generando guión..." : "Generar guión"}
              </button>
              {loading && <div style={S.loadBar} />}
              {error && <div style={S.errBox}>⚠ {error}</div>}
            </div>
          </>
        )}

        {result && resultMeta && (
          <div style={S.outputWrap}>
            <div style={S.outputTop}>
              <div style={S.outputHeadLeft}>
                <p style={S.outputEyebrow}>{prof?.nombre} · {resultMeta.nichoLabel}</p>
                <h2 style={S.outputTitle}>Guión generado</h2>
              </div>
              <button style={S.copyAllBtn} onClick={copyAll}>
                {copiedAll ? "✓ Copiado" : "Copiar todo"}
              </button>
            </div>
            <ResultCard num="01" title="Hook Viral" content={result.hook} accent={resultMeta.accent} />
            <ResultCard num="02" title="Guión del Reel" content={result.guion} accent={resultMeta.accent} />
            <ResultCard num="03" title="Visión Visual" content={result.vision_visual} accent={resultMeta.accent} />
            <ResultCard num="04" title="Versión Carrusel"
              content={Array.isArray(result.carrusel) ? result.carrusel.map((s, i) => `SLIDE ${i + 1}:\n${s}`).join("\n\n") : result.carrusel}
              accent={resultMeta.accent}
            />
            <ResultCard num="05" title="Caption + CTA" content={result.caption} accent={resultMeta.accent} />
          </div>
        )}

        <div style={S.histWrap}>
          <div style={S.histTop}>
            <span style={S.histH}>Historial</span>
            <button style={S.clrBtn} onClick={() => setHistorial([])}>Limpiar</button>
          </div>
          {historial.length === 0
            ? <div style={S.histEmpty}>Aún no has generado guiones — el historial aparecerá aquí</div>
            : historial.map(entry => (
              <div key={entry.id} style={S.histItem} onClick={() => loadHist(entry)}>
                <div style={S.histLeft}>
                  <span style={S.histBadge(entry.accent)}>{entry.profNombre}</span>
                  <span style={S.histTopic}>{entry.topic}</span>
                </div>
                <span style={S.histTime}>{entry.date} · {entry.time}</span>
              </div>
            ))
          }
        </div>
      </div>

      <div style={S.footer}>
        <p style={S.footerText}>Sistema creado por @pablojagui · El Arquitecto de Sistemas</p>
      </div>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
